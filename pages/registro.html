<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrarse - CUERAR TUCUMÁN">
    <title>Registrarse | CUERAR TUCUMÁN</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ======== ENCABEZADO ======== -->
    <header class="encabezado" id="encabezado">
        <div class="encabezado__contenedor">
            <a href="../index.html" class="encabezado__logo">
                <div class="encabezado__logo-texto">
                    <span class="encabezado__marca">CUERAR</span>
                    <span class="encabezado__ubicacion">TUCUMÁN</span>
                </div>
            </a>

            <button class="encabezado__boton-menu" id="botonMenu" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>

            <nav class="encabezado__navegacion" id="menuNav">
                <ul class="encabezado__lista-nav">
                    <li><a href="../index.html" class="encabezado__enlace-nav">Inicio</a></li>
                    <li><a href="productos.html" class="encabezado__enlace-nav">Productos</a></li>
                    <li><a href="sobre-nosotros.html" class="encabezado__enlace-nav">Sobre Nosotros</a></li>
                    <li><a href="contacto.html" class="encabezado__enlace-nav">Contacto</a></li>
                </ul>
                <div class="encabezado__auth" id="navAuth"></div>
            </nav>
        </div>
    </header>

    <!-- ======== PÁGINA DE REGISTRO ======== -->
    <main class="pagina-auth">
        <div class="auth-card">

            <div class="auth-card__encabezado">
                <span class="auth-card__icono">📝</span>
                <h1 class="auth-card__titulo">Crear Cuenta</h1>
                <p class="auth-card__subtitulo">Registrate en CUERAR TUCUMÁN</p>
            </div>

            <!-- Mensaje de error -->
            <div class="auth-card__error" id="authError" style="display:none;"></div>

            <form class="auth-card__formulario" id="formRegistro" novalidate>

                <div class="campo">
                    <label class="campo__etiqueta" for="nombre">Nombre completo</label>
                    <input
                        class="campo__input"
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Juan Pérez"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="email">Correo electrónico</label>
                    <input
                        class="campo__input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="password">Contraseña</label>
                    <div class="campo__input-grupo">
                        <input
                            class="campo__input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Mínimo 6 caracteres"
                            required
                            autocomplete="new-password"
                        >
                        <button type="button" class="campo__ojo" id="togglePassword" aria-label="Ver contraseña">👁</button>
                    </div>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="confirmar">Confirmar contraseña</label>
                    <input
                        class="campo__input"
                        type="password"
                        id="confirmar"
                        name="confirmar"
                        placeholder="Repetí tu contraseña"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <!-- Sección de código admin (opcional) -->
                <details class="auth-card__admin-toggle">
                    <summary>¿Sos administrador?</summary>
                    <div class="campo" style="margin-top: 10px;">
                        <label class="campo__etiqueta" for="codigoAdmin">Código de administrador</label>
                        <input
                            class="campo__input"
                            type="password"
                            id="codigoAdmin"
                            name="codigoAdmin"
                            placeholder="Ingresá el código secreto de admin"
                            autocomplete="off"
                        >
                        <small class="campo__ayuda">
                            Si tenés el código, tu cuenta tendrá permisos de administrador.
                        </small>
                    </div>
                </details>

                <button type="submit" class="boton boton--primario auth-card__submit" id="btnSubmit">
                    Crear cuenta
                </button>

            </form>

            <div class="auth-card__footer">
                <p>¿Ya tenés cuenta? <a href="login.html" class="auth-card__link">Iniciá sesión</a></p>
            </div>

        </div>
    </main>

    <!-- ======== FOOTER SIMPLIFICADO ======== -->
    <footer class="pie" style="margin-top:auto;">
        <div class="pie__inferior">
            <p class="pie__copyright">© 2024 CUERAR TUCUMÁN. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../src/js/api.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        // Redirigir si ya está logueado
        if (estaLogueado()) {
            window.location.href = "../index.html";
        }

        // Mostrar/ocultar contraseña
        document.getElementById("togglePassword").addEventListener("click", function () {
            const input = document.getElementById("password");
            const esPassword = input.type === "password";
            input.type = esPassword ? "text" : "password";
            this.textContent = esPassword ? "🙈" : "👁";
        });

        // Envío del formulario
        document.getElementById("formRegistro").addEventListener("submit", async function (e) {
            e.preventDefault();

            const errorDiv  = document.getElementById("authError");
            const btnSubmit = document.getElementById("btnSubmit");
            errorDiv.style.display = "none";

            const nombre      = document.getElementById("nombre").value.trim();
            const email       = document.getElementById("email").value.trim();
            const password    = document.getElementById("password").value;
            const confirmar   = document.getElementById("confirmar").value;
            const codigoAdmin = document.getElementById("codigoAdmin").value.trim();

            // Validaciones en el cliente
            if (!nombre || !email || !password || !confirmar) {
                errorDiv.textContent = "Completá todos los campos obligatorios.";
                errorDiv.style.display = "block";
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = "La contraseña debe tener al menos 6 caracteres.";
                errorDiv.style.display = "block";
                return;
            }

            if (password !== confirmar) {
                errorDiv.textContent = "Las contraseñas no coinciden.";
                errorDiv.style.display = "block";
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Creando cuenta...";

            try {
                // 1. Registrar
                const regData = await apiFetch("/auth/register", {
                    method: "POST",
                    body: JSON.stringify({ nombre, email, password, codigo_admin: codigoAdmin })
                });

                // 2. Login automático
                const loginData = await apiFetch("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ email, password })
                });

                guardarSesion(loginData.access_token, loginData.usuario);

                // 3. Redirigir con mensaje de bienvenida
                window.location.href = "../index.html";

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = "block";
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Crear cuenta";
            }
        });
    </script>
    <script src="../src/js/main.js"></script>
</body>
</html>
