<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar sesión - CUERAR TUCUMÁN">
    <title>Iniciar Sesión | CUERAR TUCUMÁN</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ======== ENCABEZADO ======== -->
    <header class="encabezado" id="encabezado">
        <div class="encabezado__contenedor">
            <a href="../index.html" class="encabezado__logo">
                <span class="encabezado__logo-icono">🐂</span>
                <div class="encabezado__logo-texto">
                    <span class="encabezado__marca">CUERAR</span>
                    <span class="encabezado__ubicacion">TUCUMÁN</span>
                </div>
            </a>

            <button class="encabezado__boton-menu" id="botonMenu" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>

            <nav class="encabezado__navegacion" id="menuNav">
                <ul class="encabezado__lista-nav">
                    <li><a href="../index.html" class="encabezado__enlace-nav">Inicio</a></li>
                    <li><a href="productos.html" class="encabezado__enlace-nav">Productos</a></li>
                    <li><a href="sobre-nosotros.html" class="encabezado__enlace-nav">Sobre Nosotros</a></li>
                    <li><a href="contacto.html" class="encabezado__enlace-nav">Contacto</a></li>
                </ul>
                <div class="encabezado__auth" id="navAuth"></div>
            </nav>
        </div>
    </header>

    <!-- ======== PÁGINA DE LOGIN ======== -->
    <main class="pagina-auth">
        <div class="auth-card">

            <div class="auth-card__encabezado">
                <span class="auth-card__icono">🔐</span>
                <h1 class="auth-card__titulo">Iniciar Sesión</h1>
                <p class="auth-card__subtitulo">Accedé a tu cuenta de CUERAR TUCUMÁN</p>
            </div>

            <!-- Mensaje de error -->
            <div class="auth-card__error" id="authError" style="display:none;"></div>

            <form class="auth-card__formulario" id="formLogin" novalidate>

                <div class="campo">
                    <label class="campo__etiqueta" for="email">Correo electrónico</label>
                    <input
                        class="campo__input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="password">Contraseña</label>
                    <div class="campo__input-grupo">
                        <input
                            class="campo__input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Tu contraseña"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="campo__ojo" id="togglePassword" aria-label="Ver contraseña">👁</button>
                    </div>
                </div>

                <button type="submit" class="boton boton--primario auth-card__submit" id="btnSubmit">
                    Ingresar
                </button>

            </form>

            <div class="auth-card__footer">
                <p>¿No tenés cuenta? <a href="registro.html" class="auth-card__link">Registrate</a></p>
            </div>

        </div>
    </main>

    <!-- ======== FOOTER SIMPLIFICADO ======== -->
    <footer class="pie" style="margin-top:auto;">
        <div class="pie__inferior">
            <p class="pie__copyright">© 2024 CUERAR TUCUMÁN. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../src/js/api.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        // Redirigir si ya está logueado
        if (estaLogueado()) {
            window.location.href = "../index.html";
        }

        // Mostrar/ocultar contraseña
        document.getElementById("togglePassword").addEventListener("click", function () {
            const input = document.getElementById("password");
            const esPassword = input.type === "password";
            input.type = esPassword ? "text" : "password";
            this.textContent = esPassword ? "🙈" : "👁";
        });

        // Envío del formulario
        document.getElementById("formLogin").addEventListener("submit", async function (e) {
            e.preventDefault();

            const errorDiv = document.getElementById("authError");
            const btnSubmit = document.getElementById("btnSubmit");
            errorDiv.style.display = "none";

            const email    = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                errorDiv.textContent = "Completá todos los campos.";
                errorDiv.style.display = "block";
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = "Ingresando...";

            try {
                const datos = await apiFetch("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ email, password })
                });

                guardarSesion(datos.access_token, datos.usuario);

                // Redirigir según el rol
                if (datos.usuario.es_admin) {
                    window.location.href = "../index.html";
                } else {
                    window.location.href = "../index.html";
                }

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = "block";
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Ingresar";
            }
        });
    </script>
    <script src="../src/js/main.js"></script>
</body>
</html>
